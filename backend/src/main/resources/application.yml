spring:
  application:
    name: plant-app-backend
  datasource:
    url: jdbc:h2:mem:sikjipsa;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  storage:
    bucket: sikjipsa-dev
    public-base-url: http://localhost:9000/sikjipsa-dev
